<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="background:#0F0F11;color:#FCA5A5;padding:24px;font-family:sans-serif;border-radius:12px;margin:24px;border:1px solid rgba(239,68,68,0.2);max-width:600px;mx-auto"><h3 style="font-size:16px;font-weight:bold;margin:0 0 8px 0;color:#F87171">Runtime Loading Exception</h3><p style="font-size:12px;color:#94A3B8;margin:0 0 12px 0">' + e.message + '</p><pre style="white-space:pre-wrap;font-size:11px;background:#050506;padding:12px;overflow-x:auto;color:#CBD5E1;border-radius:6px;border:1px solid #1C1C21;margin:0">' + (e.error ? e.error.stack : 'No stacktrace information') + '</pre><button onclick="location.reload()" style="margin-top:16px;background:#10B981;color:#000;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer">Reload Console</button></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="background:#0F0F11;color:#FCA5A5;padding:24px;font-family:sans-serif;border-radius:12px;margin:24px;border:1px solid rgba(239,68,68,0.2);max-width:600px;mx-auto"><h3 style="font-size:16px;font-weight:bold;margin:0 0 8px 0;color:#F87171">Unhandled Execution Promise Rejection</h3><p style="font-size:12px;color:#94A3B8;margin:0 0 12px 0">' + (e.reason ? e.reason.message || e.reason : 'No exception reason specified') + '</p><pre style="white-space:pre-wrap;font-size:11px;background:#050506;padding:12px;overflow-x:auto;color:#CBD5E1;border-radius:6px;border:1px solid #1C1C21;margin:0">' + (e.reason && e.reason.stack ? e.reason.stack : 'No stacktrace available') + '</pre><button onclick="location.reload()" style="margin-top:16px;background:#10B981;color:#000;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer">Reload Console</button></div>';
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
